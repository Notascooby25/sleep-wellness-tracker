name: sleep-wellness-tracker

services:
  db:
    image: postgres:15
    container_name: sleep_db
    env_file: .env
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: sleep-wellness-tracker-backend:latest
    container_name: sleep_backend
    env_file: .env
    environment:
      - DATABASE_URL
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/app:/app/app:Z

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: sleep-wellness-tracker-frontend:latest
    container_name: sleep_frontend
    env_file: .env
    environment:
      - API_BASE
      - STREAMLIT_SERVER_RUN_ON_SAVE=true
      - STREAMLIT_SERVER_FILE_WATCHER_TYPE=watchdog
    depends_on:
      - backend
    command: streamlit run main.py --server.address=0.0.0.0 --server.port=8505 --server.runOnSave=true --server.fileWatcherType=watchdog
    ports:
      - "8505:8505"
    volumes:
      - ./frontend/main.py:/app/main.py:Z
      - ./frontend/pages:/app/pages:Z

  frontend_web:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    image: sleep-wellness-tracker-frontend-web:latest
    container_name: sleep_frontend_web
    env_file: .env
    environment:
      - API_BASE=http://backend:8000
    depends_on:
      - backend
    ports:
      - "8510:3000"

volumes:
  db_data:

