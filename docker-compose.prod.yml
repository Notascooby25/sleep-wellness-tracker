name: sleep-wellness-tracker

services:
  db:
    image: postgres:15
    container_name: sleep_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
      POSTGRES_DB: ${POSTGRES_DB:-sleepdb}
    volumes:
      - /srv/shared/postgres-data:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_USER:-postgres}\" -d \"${POSTGRES_DB:-sleepdb}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/notascooby25/sleep-wellness-tracker-backend:latest}
    container_name: sleep_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
    command: >-
      sh -lc "mkdir -p /var/log/app/backend &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      2>&1 | tee -a /var/log/app/backend/backend.log"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /srv/shared/garmin-tokens:/app/garmin_tokens:Z
      - /srv/shared/logs/backend:/var/log/app/backend:Z
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend_web:
    image: ${FRONTEND_WEB_IMAGE:-ghcr.io/notascooby25/sleep-wellness-tracker-frontend-web:latest}
    container_name: sleep_frontend_web
    restart: unless-stopped
    env_file: .env
    environment:
      - API_BASE=http://backend:8000
      - HOST=0.0.0.0
      - PORT=3000
    depends_on:
      - backend
    ports:
      - "8510:3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: sleep_watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.41}
      - WATCHTOWER_NOTIFICATION_URL=${WATCHTOWER_NOTIFICATION_URL:-}
    command: sleep_backend sleep_frontend_web
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"